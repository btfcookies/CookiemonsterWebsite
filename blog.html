                        ## Debugging Cortis

                        **For 2 days, I couldn't figure out a strange error coming form Cortis' api.**

                        > The error:

                        ```txt
                        ReferenceError: Cannot access 'state' before initialization
                            at getUser (C:\Users\Lawrence Tong\Desktop\Projects\cortis\server\index.js:148:3)
                            at befriend (C:\Users\Lawrence Tong\Desktop\Projects\cortis\server\index.js:171:17)
                            at createSeedState (C:\Users\Lawrence Tong\Desktop\Projects\cortis\server\index.js:63:3)
                            at Object.<anonymous> (C:\Users\Lawrence Tong\Desktop\Projects\cortis\server\index.js:33:15)
                            at Module._compile (node:internal/modules/cjs/loader:1759:14)
                            at Object..js (node:internal/modules/cjs/loader:1892:10)
                            at Module.load (node:internal/modules/cjs/loader:1479:32)
                            at Module._load (node:internal/modules/cjs/loader:1298:12)
                            at TracingChannel.traceSync (node:diagnostics_channel:328:14)
                            at wrapModuleLoad (node:internal/modules/cjs/loader:244:24)
                        ```

                        ---

                        I initially thought this was coming from the `createSeedState()` function, where it returned the state data using `return state.data`, which I replaced with `return data`.

                        However, I got the same error after running the server again.

                        I eventually tried adding a seperate definition of state, `let state` before the function `createSeedState()` was called.

                        This worked, which helped me realize that the error was caused by a temporal dead zone where `state` was being accessed before it was initialized.
                    </script>
                </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <script>
        function dedentMarkdown(text) {
            const normalized = text.replace(/\t/g, "    ");
            const lines = normalized.split("\n");
            const contentLines = lines.filter(line => line.trim().length > 0);

            if (contentLines.length === 0) {
                return "";
            }

            const indent = Math.min(
                ...contentLines.map(line => (line.match(/^\s*/) || [""])[0].length)
            );

            return lines.map(line => line.slice(indent)).join("\n").trim();
        }

        marked.setOptions({
            gfm: true,
            breaks: false,
            mangle: false,
            headerIds: true
        });

        const posts = document.querySelectorAll('[data-post]');

        posts.forEach(post => {
            const markdownSource = post.querySelector('.post-markdown');
            const markdownTarget = post.querySelector('.markdown-body');
            const toggleButton = post.querySelector('.post-toggle');
            const toggleLabel = post.querySelector('.post-toggle-label');
            const content = post.querySelector('.post-content');
            const markdown = dedentMarkdown(markdownSource.textContent || '');
            const rendered = marked.parse(markdown);

            markdownTarget.innerHTML = DOMPurify.sanitize(rendered);

            toggleButton.addEventListener('click', () => {
                const isExpanded = toggleButton.getAttribute('aria-expanded') === 'true';
                toggleButton.setAttribute('aria-expanded', String(!isExpanded));
                toggleLabel.textContent = isExpanded ? 'expand' : 'collapse';
                content.hidden = isExpanded;
            });
        });
    </script>
